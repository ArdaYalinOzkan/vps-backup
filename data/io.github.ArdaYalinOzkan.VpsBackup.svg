<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#62a0ea"/>
      <stop offset="100%" style="stop-color:#1c71d8"/>
    </linearGradient>
    <linearGradient id="server" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#deddda"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square (GNOME style) -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Server box top -->
  <rect x="28" y="24" width="72" height="22" rx="4" fill="url(#server)"/>
  <circle cx="88" cy="35" r="4" fill="#33d17a"/>
  <rect x="36" y="32" width="24" height="3" rx="1.5" fill="#77767b"/>
  <rect x="36" y="37" width="16" height="2" rx="1" fill="#9a9996"/>
  <!-- Server box bottom -->
  <rect x="28" y="50" width="72" height="22" rx="4" fill="url(#server)"/>
  <circle cx="88" cy="61" r="4" fill="#33d17a"/>
  <rect x="36" y="58" width="24" height="3" rx="1.5" fill="#77767b"/>
  <rect x="36" y="63" width="16" height="2" rx="1" fill="#9a9996"/>
  <!-- Download arrow -->
  <path d="M64 78 L64 106" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <path d="M52 96 L64 108 L76 96" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Check badge -->
  <circle cx="96" cy="96" r="14" fill="#26a269"/>
  <path d="M89 96 L93 100 L103 90" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
